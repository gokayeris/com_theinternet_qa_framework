name: Regression Automated Tests

# Controla cuándo se ejecuta el workflow
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Te permite ejecutarlo manualmente desde la web de GitHub

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # 1. Descarga el código del repositorio en la máquina virtual
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Configura el entorno de Python
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Instala y cachea las dependencias para que corra más rápido
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Instala los binarios de los navegadores de Playwright
    - name: Install Playwright Browsers
      run: playwright install --with-deps

    # 5. Ejecuta los tests de Pytest (generando reportes de Allure)
    - name: Run Pytest Tests
      run: pytest --alluredir=allure-results
      # Nota: Si usás variables de entorno críticas en tu .env, se mapean acá usando GitHub Secrets