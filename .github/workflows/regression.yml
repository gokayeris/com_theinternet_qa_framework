name: Regression Automated Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      # Le decimos explícitamente a este paso dónde buscar el requirements.txt
      working-directory: ./com_theinternet_qa_framework
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright Browsers
      # También necesitamos que Playwright se configure en el contexto correcto
      working-directory: ./com_theinternet_qa_framework
      run: playwright install --with-deps

    - name: Run Pytest Tests
      working-directory: ./com_theinternet_qa_framework
      env:
        BASE_URL: https://the-internet.herokuapp.com
      run: pytest --alluredir=allure-results