name: Regression Automated Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Instala automáticamente Chromium, Firefox y WebKit con sus dependencias nativas
    - name: Install Playwright Browsers
      uses: microsoft/playwright-github-action@v1

    # Ejecuta Pytest pasándole los tres navegadores en paralelo
    - name: Run Pytest Tests
      env:
        BASE_URL: https://the-internet.herokuapp.com
      run: pytest --browser chromium --browser firefox --browser webkit